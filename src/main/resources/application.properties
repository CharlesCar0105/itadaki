spring.application.name=itadaki
server.port=8080

spring.datasource.url=jdbc:h2:~/itadaki;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# --- Ollama ---
# LOCAL : http://localhost:11434
# NGROK : https://ecology-luridness-shame.ngrok-free.dev
spring.ai.ollama.base-url=https://ecology-luridness-shame.ngrok-free.dev
spring.ai.ollama.chat.model=qwen2.5:3b
spring.ai.ollama.chat.options.temperature=0.2
spring.ai.ollama.chat.options.num-predict=1024

# Modèle vision (qwen2.5vl:3b nécessite ~7GB RAM libres)
app.llava.model=qwen2.5vl:3b

# Mode mock : true = pas besoin d'Ollama (réponses simulées)
app.mock-mode=false

# RAG Service Python (optionnel — valeurs par défaut si indisponible)
rag.service.url=http://localhost:5000

# --- Encodage ---
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.force=true

# --- Swagger ---
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.try-it-out-enabled=true
springdoc.api-docs.path=/api-docs

# --- Logs ---
logging.level.fr.esgi.nutrition.itadaki=DEBUG
logging.level.org.springframework.ai=INFO
