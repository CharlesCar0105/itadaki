<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Accueil - Itadaki</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .navbar { background-color: #2e7d32 !important; }
        .btn-primary {
            --bs-btn-bg: #f4820d; --bs-btn-border-color: #f4820d; --bs-btn-color: #212529;
            --bs-btn-hover-bg: #e07200; --bs-btn-hover-border-color: #e07200; --bs-btn-hover-color: #212529;
            --bs-btn-active-bg: #cc6900; --bs-btn-active-border-color: #cc6900; --bs-btn-active-color: #212529;
            --bs-btn-focus-shadow-rgb: 244, 130, 13;
        }
        .btn-outline-primary {
            --bs-btn-focus-shadow-rgb: 244, 130, 13;
            --bs-btn-active-bg: #e07200; --bs-btn-active-color: #212529; --bs-btn-active-border-color: #e07200;
        }
    </style>
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-sm navbar-dark">
        <div class="container" style="max-width:640px">
            <span class="navbar-brand fw-bold">Itadaki</span>
            <div class="d-flex align-items-center gap-3">
                <a href="/history.html" class="nav-link text-white">Historique</a>
                <a href="/stats.html" class="nav-link text-white">Statistiques</a>
                <button class="btn btn-outline-light btn-sm" id="logoutBtn">Déconnexion</button>
            </div>
        </div>
    </nav>

    <div class="container py-4" style="max-width:640px">

        <!-- Étape 1 : upload -->
        <div class="card mb-3" id="step-upload">
            <div class="card-body">
                <h5 class="card-title">Analyser un plat</h5>
                <img id="preview" class="img-fluid rounded mb-3" alt="Aperçu" style="display:none; max-height:280px;">
                <div class="mb-3">
                    <input type="file" class="form-control" id="fileInput" accept=".jpg,.jpeg,.png,.webp,.gif">
                </div>
                <button class="btn btn-primary" id="uploadBtn">Téléverser et analyser</button>
                <div id="uploadError" class="text-danger mt-2 small"></div>
                <div id="uploadInfo" class="text-muted mt-2 small"></div>
            </div>
        </div>

        <!-- Étape 2 : correction -->
        <div class="card mb-3" id="step-correction" style="display:none">
            <div class="card-body">
                <h5 class="card-title">Vérifier l'analyse</h5>
                <p class="text-muted small">L'IA a identifié le plat suivant. Tu peux corriger avant de calculer les calories.</p>

                <label class="form-label fw-semibold" for="dishNameInput">Nom du plat</label>
                <input type="text" class="form-control mb-3" id="dishNameInput" placeholder="Nom du plat">

                <label class="form-label fw-semibold" for="ingredientsList">Ingrédients</label>
                <div id="ingredientsList" class="mb-2"></div>
                <button type="button" class="btn btn-outline-primary btn-sm mb-3" id="addIngredientBtn">+ Ajouter un ingrédient</button>

                <div>
                    <button class="btn btn-success" id="confirmBtn">Confirmer et calculer les calories</button>
                </div>
                <div id="correctionError" class="text-danger mt-2 small"></div>
            </div>
        </div>

        <!-- Étape 3 : résultat -->
        <div class="card mb-3" id="step-result" style="display:none">
            <div class="card-body">
                <h5 class="card-title">Résultat</h5>
                <div class="alert alert-success mb-3">
                    <div id="finalAnalysisText"></div>
                    <div class="fs-4 fw-bold mt-2" id="caloriesText"></div>
                </div>
                <button class="btn btn-primary" id="newPhotoBtn">Analyser un autre plat</button>
            </div>
        </div>

    </div>

    <script>
        let currentPhotoId = null;

        const fileInput       = document.getElementById('fileInput');
        const preview         = document.getElementById('preview');
        const uploadBtn       = document.getElementById('uploadBtn');
        const uploadError     = document.getElementById('uploadError');
        const uploadInfo      = document.getElementById('uploadInfo');
        const confirmBtn      = document.getElementById('confirmBtn');
        const correctionError = document.getElementById('correctionError');
        const ingredientsList = document.getElementById('ingredientsList');

        function addIngredientRow(name = '', weight = '') {
            const row = document.createElement('div');
            row.className = 'd-flex gap-2 mb-2 align-items-center ingredient-row';

            const nameInput = document.createElement('input');
            nameInput.type = 'text';
            nameInput.className = 'form-control form-control-sm ing-name';
            nameInput.value = name;
            nameInput.placeholder = 'Ingrédient';
            nameInput.style.flex = '2';

            const weightInput = document.createElement('input');
            weightInput.type = 'number';
            weightInput.className = 'form-control form-control-sm ing-weight';
            weightInput.value = weight;
            weightInput.placeholder = '0';
            weightInput.min = '0';
            weightInput.style.flex = '1';

            const unit = document.createElement('span');
            unit.className = 'text-muted small';
            unit.textContent = 'g';

            const removeBtn = document.createElement('button');
            removeBtn.type = 'button';
            removeBtn.textContent = '✕';
            removeBtn.className = 'btn btn-outline-danger btn-sm';
            removeBtn.addEventListener('click', () => row.remove());

            row.appendChild(nameInput);
            row.appendChild(weightInput);
            row.appendChild(unit);
            row.appendChild(removeBtn);
            ingredientsList.appendChild(row);
        }

        function populateForm(preliminaryAnalysis) {
            ingredientsList.innerHTML = '';
            try {
                const data = JSON.parse(preliminaryAnalysis);
                document.getElementById('dishNameInput').value = data.dish_name ?? '';
                (data.ingredients ?? []).forEach(ing => addIngredientRow(ing.name ?? '', ing.estimated_weight_g ?? ''));
            } catch {
                document.getElementById('dishNameInput').value = '';
                addIngredientRow();
            }
        }

        function collectAnalysis() {
            const dishName = document.getElementById('dishNameInput').value.trim();
            const ingredients = [];
            ingredientsList.querySelectorAll('.ingredient-row').forEach(row => {
                const name = row.querySelector('.ing-name').value.trim();
                const weight = Number.parseFloat(row.querySelector('.ing-weight').value) || 0;
                if (name) ingredients.push({ name, estimated_weight_g: weight });
            });
            return JSON.stringify({ dish_name: dishName, ingredients });
        }

        document.getElementById('addIngredientBtn').addEventListener('click', () => addIngredientRow());

        fileInput.addEventListener('change', () => {
            const file = fileInput.files[0];
            if (!file) return;
            preview.src = URL.createObjectURL(file);
            preview.style.display = 'block';
            uploadError.textContent = '';
        });

        uploadBtn.addEventListener('click', async () => {
            const file = fileInput.files[0];
            if (!file) { uploadError.textContent = "Sélectionne une image d'abord"; return; }

            uploadBtn.disabled = true;
            uploadInfo.textContent = 'Envoi en cours…';
            uploadError.textContent = '';

            const formData = new FormData();
            formData.append('file', file);

            try {
                const uploadRes = await fetch('/api/photos/upload', { method: 'POST', body: formData });
                if (!uploadRes.ok) { uploadError.textContent = await uploadRes.text(); uploadBtn.disabled = false; uploadInfo.textContent = ''; return; }
                const uploaded = await uploadRes.json();
                currentPhotoId = uploaded.id;

                uploadInfo.textContent = 'Analyse en cours…';
                const analyzeRes = await fetch(`/api/photos/${currentPhotoId}/analyze`, { method: 'POST' });
                if (!analyzeRes.ok) { uploadError.textContent = 'Erreur lors de l\'analyse'; uploadBtn.disabled = false; uploadInfo.textContent = ''; return; }
                const analyzed = await analyzeRes.json();

                populateForm(analyzed.preliminaryAnalysis);
                document.getElementById('step-upload').style.display = 'none';
                document.getElementById('step-correction').style.display = 'block';

            } catch (e) {
                console.error(e);
                uploadError.textContent = 'Erreur réseau';
                uploadBtn.disabled = false;
                uploadInfo.textContent = '';
            }
        });

        confirmBtn.addEventListener('click', async () => {
            const corrected = collectAnalysis();
            const parsed = JSON.parse(corrected);
            if (!parsed.dish_name) { correctionError.textContent = 'Le nom du plat ne peut pas être vide'; return; }

            confirmBtn.disabled = true;
            correctionError.textContent = '';

            try {
                const res = await fetch(`/api/photos/${currentPhotoId}/finalize`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ correctedAnalysis: corrected })
                });

                if (!res.ok) { correctionError.textContent = 'Erreur lors du calcul des calories'; confirmBtn.disabled = false; return; }
                const result = await res.json();

                document.getElementById('finalAnalysisText').textContent = result.finalAnalysis ?? result.preliminaryAnalysis;
                document.getElementById('caloriesText').textContent = result.calories == null
                    ? 'Calories à venir'
                    : `${result.calories} kcal`;

                document.getElementById('step-correction').style.display = 'none';
                document.getElementById('step-result').style.display = 'block';

            } catch (e) {
                console.error(e);
                correctionError.textContent = 'Erreur réseau';
                confirmBtn.disabled = false;
            }
        });

        document.getElementById('newPhotoBtn').addEventListener('click', () => {
            currentPhotoId = null;
            fileInput.value = '';
            preview.style.display = 'none';
            uploadBtn.disabled = false;
            uploadInfo.textContent = '';
            confirmBtn.disabled = false;
            correctionError.textContent = '';
            ingredientsList.innerHTML = '';
            document.getElementById('dishNameInput').value = '';
            document.getElementById('step-result').style.display = 'none';
            document.getElementById('step-upload').style.display = 'block';
        });

        document.getElementById('logoutBtn').addEventListener('click', async () => {
            await fetch('/api/auth/logout', { method: 'POST' });
            globalThis.location.href = '/login.html';
        });
    </script>
</body>
</html>
