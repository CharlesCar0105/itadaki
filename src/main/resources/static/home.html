<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Accueil - Itadaki</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 80px auto; text-align: center; }
        h1 { color: #333; }
        button { padding: 10px 20px; background: #d0021b; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; }
        button:hover { background: #a50017; }
    </style>
</head>
<body>
    <h1>Bienvenue sur Itadaki</h1>
    <p>Tu es connecté.</p>
    <p><em>(L'upload de photos et l'historique arriveront ensuite.)</em></p>
    <button id="logoutBtn">Se déconnecter</button>

    <script>
        document.getElementById('logoutBtn').addEventListener('click', async () => {
            const res = await fetch('/api/auth/logout', { method: 'POST' });
            if (res.ok) {
                window.location.href = '/login.html';
            }
        });
    </script>
</body>
</html>
