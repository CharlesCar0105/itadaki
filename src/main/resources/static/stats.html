<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Statistiques - Itadaki</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .navbar { background-color: #2e7d32 !important; }
        .text-primary { color: #2e7d32 !important; }
    </style>
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-sm navbar-dark">
        <div class="container" style="max-width:700px">
            <a class="navbar-brand fw-bold" href="/home.html">Itadaki</a>
            <div class="d-flex align-items-center gap-3">
                <a href="/home.html" class="nav-link text-white">Accueil</a>
                <a href="/history.html" class="nav-link text-white">Historique</a>
            </div>
        </div>
    </nav>

    <div class="container py-4" style="max-width:700px">
        <h4 class="mb-3">Évolution des calories</h4>

        <div class="row g-3 mb-4">
            <div class="col-4">
                <div class="card text-center h-100">
                    <div class="card-body">
                        <div class="fs-3 fw-bold text-primary" id="todayCalories">—</div>
                        <div class="text-muted small mt-1">Calories aujourd'hui</div>
                    </div>
                </div>
            </div>
            <div class="col-4">
                <div class="card text-center h-100">
                    <div class="card-body">
                        <div class="fs-3 fw-bold text-primary" id="avgCalories">—</div>
                        <div class="text-muted small mt-1">Moyenne / jour (7 j)</div>
                    </div>
                </div>
            </div>
            <div class="col-4">
                <div class="card text-center h-100">
                    <div class="card-body">
                        <div class="fs-3 fw-bold text-primary" id="totalDays">—</div>
                        <div class="text-muted small mt-1">Jours enregistrés</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-body">
                <canvas id="chart"></canvas>
            </div>
        </div>

        <div id="empty" class="text-center text-muted mt-5" style="display:none">
            Aucune donnée disponible — analysez des plats pour voir votre évolution.
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
    <script type="module">
        const res = await fetch('/api/photos/stats/daily');
        if (!res.ok) { globalThis.location.href = '/login.html'; }

        const data = await res.json();

        if (data.length === 0) {
            document.getElementById('empty').style.display = 'block';
        } else {
            const labels   = data.map(d => new Date(d.date).toLocaleDateString('fr-FR', { day: '2-digit', month: '2-digit' }));
            const calories = data.map(d => d.totalCalories);
            const today    = new Date().toISOString().slice(0, 10);

            const todayEntry = data.find(d => d.date === today);
            document.getElementById('todayCalories').textContent = todayEntry ? `${todayEntry.totalCalories} kcal` : '0 kcal';

            const last7 = data.slice(-7);
            const avg   = Math.round(last7.reduce((s, d) => s + d.totalCalories, 0) / last7.length);
            document.getElementById('avgCalories').textContent = `${avg} kcal`;
            document.getElementById('totalDays').textContent   = data.length;

            new Chart(document.getElementById('chart'), {
                data: {
                    labels,
                    datasets: [
                        {
                            type: 'bar',
                            label: 'Calories',
                            data: calories,
                            backgroundColor: calories.map(c => c > 2000 ? '#dc3545' : '#f4820d'),
                            borderRadius: 4,
                        },
                        {
                            type: 'line',
                            label: 'Référence 2000 kcal',
                            data: Array(labels.length).fill(2000),
                            borderColor: '#ffc107',
                            borderDash: [6, 4],
                            borderWidth: 2,
                            pointRadius: 0,
                            fill: false,
                        }
                    ]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: { position: 'bottom' },
                        tooltip: { callbacks: { label: ctx => `${ctx.parsed.y} kcal` } }
                    },
                    scales: {
                        y: { beginAtZero: true, title: { display: true, text: 'kcal' } },
                        x: { title: { display: true, text: 'Date' } }
                    }
                }
            });
        }
    </script>
</body>
</html>
