<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Inscription - Itadaki</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/style.css" rel="stylesheet">
</head>
<body class="bg-light min-vh-100 d-flex align-items-center justify-content-center">
    <div class="card shadow-sm" style="width:380px">
        <div class="card-body p-4">
            <h2 class="card-title text-center mb-4">Inscription</h2>
            <form id="registerForm">
                <div class="mb-3">
                    <input type="text" class="form-control" id="username" placeholder="Nom d'utilisateur" required>
                </div>
                <div class="mb-3">
                    <input type="password" class="form-control" id="password" placeholder="Mot de passe (min. 4 caractères)" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">S'inscrire</button>
            </form>
            <div id="message" class="mt-3 text-center small"></div>
            <hr class="my-3">
            <p class="text-center mb-0 small"><a href="/login.html">Déjà un compte ? Se connecter</a></p>
        </div>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const msg = document.getElementById('message');
            try {
                const res = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ username, password })
                });
                const text = await res.text();
                if (res.ok) {
                    msg.className = 'mt-3 text-center small text-success';
                    msg.textContent = 'Inscription réussie ! Redirection...';
                    setTimeout(() => globalThis.location.href = '/home.html', 1000);
                } else {
                    msg.className = 'mt-3 text-center small text-danger';
                    msg.textContent = text;
                }
            } catch (err) {
                console.error(err);
            }
        });
    </script>
</body>
</html>
