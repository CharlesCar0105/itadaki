<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Historique - Itadaki</title>
    <style>
        body { font-family: sans-serif; max-width: 700px; margin: 60px auto; }
        h1 { color: #333; text-align: center; }
        .nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
        .nav a { color: #4a90e2; text-decoration: none; }
        .meal { border: 1px solid #ddd; border-radius: 8px; padding: 16px; margin-bottom: 16px; display: flex; gap: 16px; }
        .meal img { width: 120px; height: 90px; object-fit: cover; border-radius: 4px; flex-shrink: 0; }
        .meal-info { flex: 1; }
        .meal-info h3 { margin: 0 0 6px 0; color: #333; font-size: 15px; }
        .meal-date { font-size: 12px; color: #999; margin-bottom: 8px; }
        .meal-analysis { font-size: 14px; color: #555; margin-bottom: 6px; }
        .meal-calories { font-weight: bold; color: #4a90e2; }
        .meal-pending { font-size: 13px; color: #aaa; font-style: italic; }
        .total { text-align: right; font-size: 16px; font-weight: bold; color: #333; margin-bottom: 16px; }
        #empty { text-align: center; color: #999; margin-top: 40px; }
    </style>
</head>
<body>
    <div class="nav">
        <a href="/home.html">← Retour</a>
        <h1 style="margin:0">Historique</h1>
        <span></span>
    </div>

    <div id="total" class="total" style="display:none"></div>
    <div id="list"></div>
    <div id="empty" style="display:none">Aucune photo téléversée pour l'instant.</div>

    <script type="module">
        function formatDate(iso) {
            return new Date(iso).toLocaleString('fr-FR', {
                day: '2-digit', month: '2-digit', year: 'numeric',
                hour: '2-digit', minute: '2-digit'
            });
        }

        const res = await fetch('/api/photos/history');

        if (!res.ok) {
            globalThis.location.href = '/login.html';
            throw new Error('Unauthorized');
        }

        const items = await res.json();
        const list = document.getElementById('list');
        const empty = document.getElementById('empty');
        const totalEl = document.getElementById('total');

        if (items.length === 0) {
            empty.style.display = 'block';
        }

        if (items.length > 0) {
            const totalCalories = items
                .filter(i => i.calories != null)
                .reduce((sum, i) => sum + i.calories, 0);

            if (totalCalories > 0) {
                totalEl.style.display = 'block';
                totalEl.textContent = `Total calories : ${totalCalories} kcal`;
            }

            items.forEach(item => {
                const div = document.createElement('div');
                div.className = 'meal';
                div.innerHTML = `
                    <img src="/api/photos/${item.id}/image" alt="${item.filename}">
                    <div class="meal-info">
                        <h3>${item.filename}</h3>
                        <div class="meal-date">${formatDate(item.uploadedAt)}</div>
                        ${item.analysisResult
                            ? `<div class="meal-analysis">${item.analysisResult}</div>`
                            : `<div class="meal-pending">Analyse en attente…</div>`
                        }
                        ${item.calories
                            ? `<div class="meal-calories">${item.calories} kcal</div>`
                            : ''
                        }
                    </div>
                `;
                list.appendChild(div);
            });
        }
    </script>
</body>
</html>
