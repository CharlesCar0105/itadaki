<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Historique - Itadaki</title>
    <style>
        body { font-family: sans-serif; max-width: 700px; margin: 60px auto; }
        .nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
        .nav a { color: #4a90e2; text-decoration: none; }
        h1 { color: #333; margin: 0; }
        .meal { border: 1px solid #ddd; border-radius: 8px; padding: 16px; margin-bottom: 16px; display: flex; gap: 16px; }
        .meal img { width: 120px; height: 90px; object-fit: cover; border-radius: 4px; flex-shrink: 0; }
        .meal-info { flex: 1; }
        .meal-info h3 { margin: 0 0 4px 0; color: #333; font-size: 15px; }
        .meal-date { font-size: 12px; color: #999; margin-bottom: 8px; }
        .badge { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 10px; margin-bottom: 8px; }
        .badge-uploaded { background: #eee; color: #666; }
        .badge-preliminary { background: #fff3cd; color: #856404; }
        .badge-finalized { background: #d4edda; color: #155724; }
        .meal-analysis { font-size: 13px; color: #555; margin-bottom: 4px; }
        .meal-calories { font-weight: bold; color: #4a90e2; font-size: 15px; }
        .meal-calories.pending { font-weight: normal; color: #aaa; font-style: italic; font-size: 13px; }
        .total { text-align: right; font-size: 16px; font-weight: bold; color: #333; margin-bottom: 16px; }
        #empty { text-align: center; color: #999; margin-top: 40px; }
    </style>
</head>
<body>
    <div class="nav">
        <a href="/home.html">← Retour</a>
        <h1>Historique</h1>
        <span></span>
    </div>

    <div id="total" class="total" style="display:none"></div>
    <div id="list"></div>
    <div id="empty" style="display:none">Aucune photo téléversée pour l'instant.</div>

    <script type="module">
        const STATUS_LABELS = {
            UPLOADED:         { text: 'Uploadé',              css: 'badge-uploaded' },
            PRELIMINARY_DONE: { text: 'Analyse préliminaire', css: 'badge-preliminary' },
            FINALIZED:        { text: 'Finalisé',             css: 'badge-finalized' }
        };

        function formatDate(iso) {
            return new Date(iso).toLocaleString('fr-FR', {
                day: '2-digit', month: '2-digit', year: 'numeric',
                hour: '2-digit', minute: '2-digit'
            });
        }

        async function loadHistory() {
            const res = await fetch('/api/photos/history');
            if (!res.ok) { globalThis.location.href = '/login.html'; return; }

            const items = await res.json();
            const list = document.getElementById('list');

            if (items.length === 0) { document.getElementById('empty').style.display = 'block'; return; }

            const totalCalories = items.filter(i => i.calories != null).reduce((s, i) => s + i.calories, 0);
            if (totalCalories > 0) {
                const totalEl = document.getElementById('total');
                totalEl.style.display = 'block';
                totalEl.textContent = `Total calories : ${totalCalories} kcal`;
            }

            items.forEach(item => {
                const badge = STATUS_LABELS[item.status] ?? { text: item.status, css: 'badge-uploaded' };
                const analysis = item.finalAnalysis ?? item.preliminaryAnalysis;

                const div = document.createElement('div');
                div.className = 'meal';
                div.innerHTML = `
                    <img src="/api/photos/${item.id}/image" alt="${item.filename}">
                    <div class="meal-info">
                        <h3>${item.filename}</h3>
                        <div class="meal-date">${formatDate(item.uploadedAt)}</div>
                        <span class="badge ${badge.css}">${badge.text}</span>
                        ${analysis
                            ? `<div class="meal-analysis">${analysis}</div>`
                            : `<div class="meal-analysis" style="color:#aaa;font-style:italic">Analyse en attente…</div>`
                        }
                        <div class="meal-calories ${item.calories == null ? 'pending' : ''}">${item.calories == null ? 'Calories : en attente' : `${item.calories} kcal`}</div>
                    </div>
                `;
                list.appendChild(div);
            });
        }

        await loadHistory();
    </script>
</body>
</html>
