<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Historique - Itadaki</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/style.css" rel="stylesheet">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-sm navbar-dark">
        <div class="container" style="max-width:700px">
            <a class="navbar-brand fw-bold" href="/home.html">Itadaki</a>
            <div class="d-flex align-items-center gap-3">
                <a href="/home.html" class="nav-link text-white">Accueil</a>
                <a href="/stats.html" class="nav-link text-white">Statistiques</a>
            </div>
        </div>
    </nav>

    <div class="container py-4" style="max-width:700px">
        <h4 class="mb-3">Historique</h4>
        <div id="total" class="text-end fw-bold mb-3" style="display:none"></div>
        <div id="list"></div>
        <div id="empty" class="text-center text-muted mt-5" style="display:none">Aucune photo téléversée pour l'instant.</div>
    </div>

    <script type="module">
        const BADGE = {
            UPLOADED:         { text: 'Uploadé',              cls: 'bg-secondary' },
            PRELIMINARY_DONE: { text: 'Analyse préliminaire', cls: 'bg-warning text-dark' },
            FINALIZED:        { text: 'Finalisé',             cls: 'bg-success' }
        };

        function formatDate(iso) {
            return new Date(iso).toLocaleString('fr-FR', {
                day: '2-digit', month: '2-digit', year: 'numeric',
                hour: '2-digit', minute: '2-digit'
            });
        }

        async function loadHistory() {
            const res = await fetch('/api/photos/history');
            if (!res.ok) { globalThis.location.href = '/login.html'; return; }

            const items = await res.json();
            const list = document.getElementById('list');

            if (items.length === 0) { document.getElementById('empty').style.display = 'block'; return; }

            const totalCalories = items.filter(i => i.calories != null).reduce((s, i) => s + i.calories, 0);
            if (totalCalories > 0) {
                const totalEl = document.getElementById('total');
                totalEl.style.display = 'block';
                totalEl.textContent = `Total calories : ${totalCalories} kcal`;
            }

            items.forEach(item => {
                const badge    = BADGE[item.status] ?? { text: item.status, cls: 'bg-secondary' };
                const analysis = item.finalAnalysis ?? item.preliminaryAnalysis;

                const div = document.createElement('div');
                div.className = 'card mb-3';
                div.innerHTML = `
                    <div class="card-body d-flex gap-3">
                        <img src="/api/photos/${item.id}/image" alt="${item.filename}"
                             style="width:120px;height:90px;object-fit:cover;border-radius:6px;flex-shrink:0;">
                        <div class="flex-grow-1">
                            <div class="d-flex justify-content-between align-items-start mb-1">
                                <h6 class="mb-0">${item.filename}</h6>
                                <div class="d-flex align-items-center gap-2">
                                    <span class="badge ${badge.cls}">${badge.text}</span>
                                    <button class="btn btn-outline-danger btn-sm btn-delete">Supprimer</button>
                                </div>
                            </div>
                            <div class="d-flex align-items-center gap-2 mb-2">
                                <small class="text-muted text-nowrap">Date du repas :</small>
                                <input type="date" class="form-control form-control-sm input-meal-date" style="width:auto" value="${item.mealDate}">
                            </div>
                            ${analysis
                                ? `<p class="small mb-1">${analysis}</p>`
                                : `<p class="small text-muted fst-italic mb-1">Analyse en attente…</p>`
                            }
                            <div class="${item.calories == null ? 'text-muted small fst-italic' : 'fw-bold text-primary'}">
                                ${item.calories == null ? 'Calories : en attente' : `${item.calories} kcal`}
                            </div>
                        </div>
                    </div>
                `;

                div.querySelector('.btn-delete').addEventListener('click', async () => {
                    if (!confirm(`Supprimer "${item.filename}" ?`)) return;
                    const res = await fetch(`/api/photos/${item.id}`, { method: 'DELETE' });
                    if (res.ok) div.remove();
                });

                div.querySelector('.input-meal-date').addEventListener('change', async (e) => {
                    await fetch(`/api/photos/${item.id}/meal-date`, {
                        method: 'PATCH',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ mealDate: e.target.value })
                    });
                });

                list.appendChild(div);
            });
        }

        await loadHistory();
    </script>
</body>
</html>
