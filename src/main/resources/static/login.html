<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Connexion - Itadaki</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .btn-primary {
            --bs-btn-bg: #f4820d; --bs-btn-border-color: #f4820d; --bs-btn-color: #212529;
            --bs-btn-hover-bg: #e07200; --bs-btn-hover-border-color: #e07200; --bs-btn-hover-color: #212529;
        }
        a { color: #2e7d32; } a:hover { color: #1b5e20; }
    </style>
</head>
<body class="bg-light min-vh-100 d-flex align-items-center justify-content-center">
    <div class="card shadow-sm" style="width:380px">
        <div class="card-body p-4">
            <h2 class="card-title text-center mb-4">Connexion</h2>
            <form id="loginForm">
                <div class="mb-3">
                    <input type="text" class="form-control" id="username" placeholder="Nom d'utilisateur" required>
                </div>
                <div class="mb-3">
                    <input type="password" class="form-control" id="password" placeholder="Mot de passe" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">Se connecter</button>
            </form>
            <div id="message" class="mt-3 text-center small"></div>
            <hr class="my-3">
            <p class="text-center mb-0 small"><a href="/register.html">Pas encore de compte ? S'inscrire</a></p>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const msg = document.getElementById('message');
            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const text = await res.text();
                if (res.ok) {
                    msg.className = 'mt-3 text-center small text-success';
                    msg.textContent = 'Connexion réussie ! Redirection...';
                    setTimeout(() => globalThis.location.href = '/home.html', 800);
                } else {
                    msg.className = 'mt-3 text-center small text-danger';
                    msg.textContent = text;
                }
            } catch (err) {
                console.error(err);
            }
        });
    </script>
</body>
</html>
